<table role="presentation" width="100%" cellpadding="0" cellspacing="0" border="0" style="margin:16px 0;background-color:#f9fafb;border:1px solid #e5e7eb;border-radius:6px;">
  {% for row in details %}
  <tr>
    <td style="padding:10px 16px;{% if not forloop.last %}border-bottom:1px solid #e5e7eb;{% endif %}">
      <span style="display:block;font-size:12px;color:#6b7280;text-transform:uppercase;letter-spacing:0.03em;">{{ row.label }}</span>
      <span style="display:block;margin-top:2px;font-size:15px;color:#111827;">{{ row.value }}</span>
    </td>
  </tr>
  {% endfor %}
</table>
