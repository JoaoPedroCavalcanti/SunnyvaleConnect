{% extends "emails/base.html" %}

{% block title %}Your request was rejected{% endblock %}

{% block content %}
<p style="margin:0 0 16px;">Dear {{ requester_name }},</p>
<p style="margin:0 0 16px;">
  Your request to join <strong>{{ unit }}</strong> was rejected.
</p>
{% if reason %}
{% include "emails/partials/notice_box.html" with text=reason_label %}
{% endif %}
{% endblock %}
