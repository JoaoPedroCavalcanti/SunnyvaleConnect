  /households/:
    get:
      operationId: households_list
      description: |-
        List households scoped to the caller.

        - Admin: every household.
        - Regular user: only the households the user is an active member of.

        Each item embeds the active members so the front can render a
        household card without an extra request per row. Reservations,
        payments and similar bundles will be appended here too.
      tags:
      - households
      security:
      - jwtAuth: []
      responses:
        '200':
          description: No response body
  /households/{id}/:
    get:
      operationId: households_retrieve
      parameters:
      - in: path
        name: id
        schema:
          type: integer
        required: true
      tags:
      - households
      security:
      - jwtAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HouseholdOutput'
          description: ''
  /households/{id}/approve/:
