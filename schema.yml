              schema:
                $ref: '#/components/schemas/HouseholdOutput'
          description: ''
  /households/{id}/decisions/:
    get:
      operationId: households_decisions_list
      description: |-
        Audit log of every approve/reject performed by a holder (or admin)
        over resident requests for this household.

        Permission: active holder of the household, or admin. Residents
        don't see the log (it can include reject reasons).
      parameters:
      - in: path
        name: id
        schema:
          type: integer
        required: true
      tags:
      - households
      security:
      - jwtAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/MembershipDecisionOutput'
          description: ''
