openapi: 3.0.3
info:
  title: SunnyvaleConnect API
  version: 1.0.0
  description: 'API of a condominium management system: users, reservations, visitor
    access, service requests, payments, deliveries and news.'
paths:
  /admin_dashboard/overview/:
    get:
      operationId: admin_dashboard_overview_retrieve
      tags:
      - admin_dashboard
      security:
      - jwtAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AdminDashboardOverview'
          description: ''
  /api/token/:
    post:
      operationId: api_token_create
      description: |-
        Custom token endpoint with explicit feedback for pending accounts.

        Replaces the stock SimpleJWT TokenObtainPairView so the front can
        differentiate 'wrong password' from 'waiting for approval'.
      tags:
      - auth
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/LoginInputRequest'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/LoginInputRequest'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/LoginInputRequest'
        required: true
      security:
      - jwtAuth: []
      - {}
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/LoginOutput'
          description: ''
  /api/token/refresh/:
    post:
      operationId: api_token_refresh_create
      description: |-
        Takes a refresh type JSON web token and returns an access type JSON web
        token if the refresh token is valid.
      tags:
      - api
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/TokenRefreshRequest'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/TokenRefreshRequest'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/TokenRefreshRequest'
        required: true
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TokenRefresh'
          description: ''
  /api/token/verify/:
    post:
      operationId: api_token_verify_create
      description: |-
        Takes a token and indicates if it is valid.  This view provides no
        information about a token's fitness for a particular use.
      tags:
      - api
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/TokenVerifyRequest'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/TokenVerifyRequest'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/TokenVerifyRequest'
        required: true
      responses:
        '200':
          description: No response body
  /bbq/:
    get:
      operationId: bbq_list
      parameters:
      - in: query
        name: status
        schema:
          type: string
          enum:
          - APPROVED
          - PENDING
          - REJECTED
        description: Filter by booking status. Useful for the admin dashboard to fetch
          only the pending queue.
      tags:
      - bbq_reservations
      security:
      - jwtAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/BBQReservationOutput'
          description: ''
    post:
      operationId: bbq_create
      tags:
      - bbq_reservations
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/BBQReservationInputRequest'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/BBQReservationInputRequest'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/BBQReservationInputRequest'
        required: true
      security:
      - jwtAuth: []
      responses:
        '201':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/BBQReservationOutput'
          description: ''
  /bbq/{id}/:
    get:
      operationId: bbq_retrieve
      parameters:
      - in: path
        name: id
        schema:
          type: integer
        required: true
      tags:
      - bbq_reservations
      security:
      - jwtAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/BBQReservationOutput'
          description: ''
    patch:
      operationId: bbq_partial_update
      parameters:
      - in: path
        name: id
        schema:
          type: integer
        required: true
      tags:
      - bbq_reservations
      requestBody:
