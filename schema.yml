components:
  schemas:
    ActionEnum:
      enum:
      - APPROVED
      - REJECTED
      type: string
      description: |-
        * `APPROVED` - Approved
        * `REJECTED` - Rejected
    AdminDashboardOverview:
      type: object
      properties:
        active_residents:
          type: integer
          readOnly: true
        total_reservations:
          type: integer
          readOnly: true
        pending_reservations:
          type: integer
          readOnly: true
        published_news:
          type: integer
          readOnly: true
      required:
      - active_residents
      - pending_reservations
      - published_news
      - total_reservations
    BBQReservationInputRequest:
      type: object
      description: |-
        Input payload.

        ``reservation_user`` is optional. Regular users typically omit it;
        if they do send their own id, the service tolerates it. Only admins
        may pass a different user's id.
      properties:
        reservation_user:
          type: integer
          nullable: true
        reservation_date:
          type: string
          format: date
        start_time:
          type: string
          format: time
          nullable: true
        end_time:
          type: string
          format: time
          nullable: true
        guest_count:
          type: integer
          minimum: 0
          nullable: true
      required:
      - reservation_date
    BBQReservationOutput:
      type: object
      description: |-
        Output payload.

        ``household`` is exposed inline so the front can show "Booked by
        apt 1101/A" without an extra request. ``reservation_user`` keeps
        the snapshot of who created the entry (useful for the front to
        render the morador name).
      properties:
        id:
          type: integer
          readOnly: true
        reservation_date:
          type: string
          format: date
        start_time:
          type: string
          format: time
          nullable: true
        end_time:
          type: string
          format: time
          nullable: true
        guest_count:
          type: integer
          maximum: 9223372036854775807
          minimum: 0
          format: int64
          nullable: true
        status:
          $ref: '#/components/schemas/Status1f0Enum'
        household:
          type: object
          additionalProperties: {}
          nullable: true
          readOnly: true
        reservation_user:
          type: object
          additionalProperties: {}
          nullable: true
          readOnly: true
        created_at:
          type: string
          format: date-time
          readOnly: true
      required:
      - created_at
      - household
      - id
      - reservation_date
      - reservation_user
    CheckinResponse:
      type: object
      properties:
        checkin_code:
          type: string
      required:
      - checkin_code
    CheckoutResponse:
      type: object
      properties:
        checkout_code:
          type: string
      required:
      - checkout_code
    CondoPaymentInputRequest:
      type: object
      properties:
        payer_user:
          type: integer
        title:
          type: string
          minLength: 1
          maxLength: 150
        status:
          allOf:
          - $ref: '#/components/schemas/CondoPaymentStatusEnum'
          default: pending
        description:
          type: string
          nullable: true
          default: ''
          maxLength: 350
        payment_link:
          type: string
          minLength: 1
          maxLength: 150
        amount:
          type: string
          format: decimal
          pattern: ^-?\d{0,8}(?:\.\d{0,2})?$
          default: '0.00'
        due_date:
          type: string
          format: date
          nullable: true
        payment_date:
          type: string
          format: date-time
          nullable: true
      required:
      - payer_user
      - payment_link
      - title
    CondoPaymentOutput:
      type: object
      properties:
        id:
          type: integer
          readOnly: true
        title:
          type: string
          maxLength: 150
        status:
          $ref: '#/components/schemas/CondoPaymentStatusEnum'
        description:
          type: string
          nullable: true
          maxLength: 350
        payment_link:
          type: string
          maxLength: 150
        amount:
          type: string
          format: decimal
          pattern: ^-?\d{0,8}(?:\.\d{0,2})?$
        due_date:
          type: string
          format: date
          nullable: true
        payment_date:
          type: string
          format: date-time
          nullable: true
        created_at:
          type: string
          format: date-time
          readOnly: true
        updated_at:
          type: string
          format: date-time
          readOnly: true
        payer_user:
          type: integer
      required:
      - created_at
      - id
      - payer_user
      - payment_link
      - title
      - updated_at
    CondoPaymentStatusEnum:
      enum:
      - pending
      - paid
      - overdue
      type: string
      description: |-
        * `pending` - Pending
        * `paid` - Paid
        * `overdue` - Overdue
    DeliveryNotificationInputRequest:
      type: object
      properties:
        user_to_delivery:
          type: integer
        title:
          type: string
          minLength: 1
          maxLength: 100
        description:
          type: string
          default: ''
          maxLength: 300
        delivery_platform:
          allOf:
          - $ref: '#/components/schemas/DeliveryPlatformEnum'
          default: other
        delivery_from:
          type: string
          minLength: 1
          maxLength: 150
        delivery_to:
          type: string
          default: ''
          maxLength: 150
        priority_level:
          allOf:
          - $ref: '#/components/schemas/PriorityEnum'
          default: low
      required:
      - delivery_from
      - title
      - user_to_delivery
    DeliveryNotificationOutput:
      type: object
      properties:
        id:
          type: integer
          readOnly: true
        title:
          type: string
          nullable: true
          maxLength: 100
        description:
          type: string
          nullable: true
          maxLength: 300
        delivery_platform:
          $ref: '#/components/schemas/DeliveryPlatformEnum'
        delivery_from:
          type: string
          nullable: true
          maxLength: 150
        delivery_to:
          type: string
          nullable: true
          maxLength: 150
        created_at:
          type: string
          format: date-time
          readOnly: true
        priority_level:
          $ref: '#/components/schemas/PriorityEnum'
        user_to_delivery:
          type: integer
      required:
      - created_at
      - id
      - user_to_delivery
    DeliveryPlatformEnum:
      enum:
      - ifood
      - rappi
      - uber eats
      - doordash
      - just eat
      - other
      type: string
      description: |-
        * `ifood` - Ifood
        * `rappi` - Rappi
        * `uber eats` - Uber Eats
        * `doordash` - DoorDash
        * `just eat` - Just Eat
        * `other` - Other
    DependentInputRequest:
      type: object
      properties:
        full_name:
          type: string
          minLength: 1
          maxLength: 150
        birth_date:
          type: string
          format: date
