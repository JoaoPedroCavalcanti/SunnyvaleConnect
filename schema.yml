          application/json:
            schema:
              $ref: '#/components/schemas/PatchedBBQReservationPatchRequest'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/PatchedBBQReservationPatchRequest'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/PatchedBBQReservationPatchRequest'
      security:
      - jwtAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/BBQReservationOutput'
          description: ''
    delete:
      operationId: bbq_destroy
      parameters:
      - in: path
        name: id
        schema:
          type: integer
        required: true
      tags:
      - bbq_reservations
      security:
      - jwtAuth: []
      responses:
        '204':
          description: No response body
  /bbq/{id}/approve/:
    post:
      operationId: bbq_approve_create
